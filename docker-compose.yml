version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/tasksdb
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - mongodata:/data/db

volumes:
  mongodata:
